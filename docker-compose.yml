version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - backend-data:/app/data
    env_file:
      - .env
    environment:
      - DATA_DIR=/app/data
      - FAISS_DIR=/app/data/faiss
      - UPLOADS_DIR=/app/data/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: always

volumes:
  backend-data:
